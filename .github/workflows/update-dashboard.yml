name: Update Twitter Dashboard

on:
  schedule:
    # Her gün 06:00 UTC (09:00 Istanbul) çalışır
    - cron: '0 6 * * *'
  workflow_dispatch:  # Actions sekmesinden manuel tetiklenebilir

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate dashboard
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
        run: python build.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Auto-update dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
          # Retry with rebase up to 3 times — başka bir commit araya girmişse handle eder
          for i in 1 2 3; do
            if git pull --rebase origin main && git push; then
              echo "Push successful on attempt $i"
              exit 0
            fi
            echo "Attempt $i failed, retrying after 5s..."
            sleep 5
          done
          echo "Push failed after 3 attempts"
          exit 1
